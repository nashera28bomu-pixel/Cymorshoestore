<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cymor Shoe Store</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="main-wrapper">

        <div id="scanner-layer">
            <div class="scanner-line"></div>
        </div>

        <section class="hero">

            <div class="tagline">
                STEP INTO GREATNESS
            </div>

            <div class="title-container">
                <h1 id="cymor">CYMOR</h1>
                <h1 id="shoe">SHOE</h1>
                <h1 id="store">STORE</h1>
            </div>

            <div class="shoe-wrapper">
                <img src="assets/airforce.png" alt="Air Force" class="shoe">
            </div>

            <div class="cta">
                <button class="btn-primary">SHOP NOW</button>
                <button class="btn-secondary">VIEW COLLECTION</button>
            </div>

            <div class="credit-wrapper">
                <p id="credit">MADE BY LEGENDARY SMILEY CYMOR</p>
            </div>

        </section>

    </div>

    <script src="js/scanner.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
